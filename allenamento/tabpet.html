<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Tabella PETTORALI</title>
<style>
  :root{
    --cal-bg:#f4f6f8;
    --cal-card:#ffffff;
    --cal-dark-blue:#0b3b5c;
    --cal-blue:#1e6fb8;
    --cal-white:#ffffff;
    --cal-muted:#6b7280;
    --cal-sep:#d1d5db;
    --cal-text:#111827;
  }

  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;
    background:var(--cal-bg);
    color:var(--cal-text);
    -webkit-font-smoothing:antialiased;
  }

  .calcontainer{
    max-width:1200px;
    margin:0 auto;
    padding:18px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    gap:18px;
  }

  .calcard{
    background:var(--cal-card);
    border-radius:10px;
    padding:14px;
    box-shadow:0 6px 18px rgba(11,59,92,0.06);
  }

  /* BLOCCO 1 (uguale a schedahome) */
  .calblock1 .caltitle{
    background:var(--cal-dark-blue);
    color:var(--cal-white);
    padding:18px;
    border-radius:8px;
    font-weight:800;
    font-size:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
  }

  .calblock1 .banner-wrap{
    width:100%;
    margin:10px 0; /* 10px sopra e sotto */
    display:block;
    border-radius:8px;
    overflow:hidden;
  }
  .calblock1 .banner-wrap img{
    display:block;
    width:100%;
    height:auto;
    object-fit:cover;
  }

  /* pulsante blu aggiuntivo che collega a schedahome.html */
  .calblock1 .home-cta{
    display:flex;
    justify-content:center;
    margin:8px 0 12px 0;
  }
  .home-cta a{
    background:var(--cal-blue);
    color:var(--cal-white);
    padding:10px 18px;
    border-radius:10px;
    font-weight:800;
    text-decoration:none;
    box-shadow:0 8px 18px rgba(30,111,184,0.16);
    font-size:16px;
    display:inline-flex;
    align-items:center;
    gap:10px;
  }
  .home-cta a:hover{ transform:translateY(-2px); transition:transform .12s ease; }

  .calblock1 .calbuttons{ margin-top:6px; display:flex; flex-wrap:wrap; gap:14px; justify-content:center; }

  .calbtn-circle{
    background:var(--cal-blue);
    color:var(--cal-white);
    border:0;
    min-width:60px;
    min-height:60px;
    width:72px;
    height:72px;
    border-radius:50%;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-weight:800;
    font-size:28px;
    cursor:pointer;
    box-shadow:0 6px 12px rgba(30,111,184,0.18);
    transition:transform .12s ease, box-shadow .12s ease, opacity .12s;
    text-decoration:none;
  }
  .calbtn-circle:active{ transform:translateY(1px) scale(.995); }
  .calbtn-circle:hover{ box-shadow:0 10px 20px rgba(30,111,184,0.22); }

  .calbtn-grid{
    display:grid;
    grid-template-columns:repeat(3, minmax(60px, 1fr));
    gap:14px;
    width:100%;
    max-width:520px;
    margin:0 auto;
  }

  .calseparator{ height:1px; background:var(--cal-sep); margin:6px 0 6px 0; border-radius:2px; }

    /* Nuovo Blocco 2: lista di elementi con griglia */
    .block-2 .list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .list-item{
      display:grid;
      grid-template-columns:120px 1fr;
      gap:12px;
      align-items:center;
      padding:10px;
      border-radius:8px;
      background:linear-gradient(180deg, #ffffff, #fbfdff);
      border:1px solid rgba(0,0,0,0.04);
    }

    /* Colonna sinistra: numero e immagine impilate */
    .left-col{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      gap:8px;
    }

    .left-col .code{
      font-weight:700;
      color:var(--muted);
      font-size:0.95rem;
    }

    .left-col img{
      display:block;
      max-width:100px;
      width:100%;
      height:auto;
      border-radius:6px;
      object-fit:cover;
    }

    /* Colonna destra: riquadro testo, centrato verticalmente */
    .right-col{
      display:flex;
      align-items:center; /* centra verticalmente rispetto alla riga */
      height:100%;
    }

    .right-col .title{
      width:100%;
      padding:12px;
      background:#f0f6fb;
      border-radius:8px;
      font-weight:700;
      color:#0b3b66;
      box-sizing:border-box;
    }

  /* BLOCCO 3 (identico a schedahome) */
  .calblock3 .calcatalog{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    grid-auto-rows:auto;
    gap:14px;
    align-items:start;
  }

  .calcard-item{
    background:#fff;
    border-radius:8px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    align-items:stretch;
    text-decoration:none;
    color:inherit;
    border:1px solid #e6e9ee;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .calcard-item:hover{ transform:translateY(-4px); box-shadow:0 12px 30px rgba(2,6,23,0.06); }

  .calcard-item .img-wrap{ width:100%; position:relative; background:#f3f4f6; }
  .calcard-item .img-wrap::before{ content:""; display:block; padding-top:100%; }
  .calcard-item img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block; border-bottom:1px solid rgba(0,0,0,0.04); }
  @supports (aspect-ratio: 1 / 1) {
    .calcard-item .img-wrap{ padding-top:0; aspect-ratio:1/1; }
    .calcard-item img{ position:static; width:100%; height:100%; }
  }
  .calcard-item .calcard-caption{ padding:12px; font-weight:700; text-align:center; background:#fff; font-size:15px; }

  /* Responsive adjustments */
  @media (max-width:820px){
    .exercise-row{ grid-template-columns:100px 1fr; }
    .calbtn-grid{ max-width:420px; grid-template-columns:repeat(3, 1fr); }
    .calblock3 .calcatalog{ grid-template-columns:repeat(2, 1fr); }
  }

  @media (max-width:520px){
    .exercise-row{ grid-template-columns:1fr; grid-auto-rows:auto; gap:8px; }
    .exercise-left{ flex-direction:row; align-items:center; gap:10px; justify-content:flex-start; }
    .exercise-left img{ max-width:80px; }
    .exercise-right{ padding-top:8px; padding-bottom:8px; align-items:flex-start; }
    .calbtn-grid{ grid-template-columns:repeat(3, 1fr); gap:10px; }
    .calblock3 .calcatalog{ grid-template-columns:repeat(2, 1fr); gap:10px; }
  }

  @media (max-width:360px){
    .calblock3 .calcatalog{ grid-template-columns:1fr; }
  }

  .calcenter{display:flex;align-items:center;justify-content:center}
  .calmuted{color:var(--cal-muted);font-size:13px}
  a.calbtn-circle{display:inline-flex}
</style>
</head>

<script>
/* Minimal JS: keyboard accessibility for circular buttons */
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.calbtn-circle').forEach(b => {
    b.addEventListener('keydown', (ev) => {
      if(ev.key === 'Enter' || ev.key === ' ') {
        ev.preventDefault();
        b.click();
      }
    });
  });
});
</script>
