<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dsprecord</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f6f8;
}

.container{
    width:95%;
    max-width:1000px;
    margin:auto;
}

.title{
    text-align:center;
    color:#1e5bd8;
    font-size:28px;
    font-weight:bold;
    padding:15px;
}

/* ===== PANEL ===== */
.panel{
    background:white;
    padding:12px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
}

.row{
    display:flex;
    gap:10px;
    width:100%;
    align-items:center;
}

.row input{
    flex:1;
    padding:6px;
}

/* ===== TIMER ===== */
.timer input{ width:90px; }

.btnStart{
    background:green;
    color:white;
    border:none;
    border-radius:20px;
    padding:10px 15px;
}

.btnReset{
    background:red;
    color:white;
    border:none;
    border-radius:20px;
    padding:10px 15px;
}

.countdown{
    font-weight:bold;
}

/* ===== RECORD ===== */
.record{
    background:white;
    padding:12px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.record textarea{
    width:100%;
    font-size:18px;
    font-weight:bold;
    resize:vertical;
}

.record img{
    width:95%;
    display:block;
    margin:auto;
}

.smallRow{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
}

.sep{
    height:2px;
    background:#ddd;
    margin-top:10px;
}

.bottom{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:20px 0;
}

.add{
    width:55px;
    height:55px;
    border-radius:50%;
    background:gray;
    color:white;
    font-size:26px;
    border:none;
}

.sort{
    background:blue;
    color:white;
    border:none;
    border-radius:20px;
    padding:10px 15px;
}
</style>
</head>

<body>

<div class="container">

<div class="title">TITOLO PAGINA</div>

<!-- TIMER -->
<div class="panel timer">
<input type="number" id="minuti" placeholder="minuti">
<button class="btnStart" onclick="startTimer()">START</button>
<button class="btnReset" onclick="resetTimer()">RESET</button>
<div id="countdown">00:00</div>
</div>

<!-- CATEGORIE -->
<div class="panel">

<div class="row">
<input value="TUTTI" disabled>
<button onclick="setFilter('TUTTI')">→</button>
</div>

<div class="row">
<input id="c1" placeholder="Categoria 1" oninput="saveCats()">
<button onclick="setFilter(c1.value)">→</button>
</div>

<div class="row">
<input id="c2" placeholder="Categoria 2" oninput="saveCats()">
<button onclick="setFilter(c2.value)">→</button>
</div>

<div class="row">
<input id="c3" placeholder="Categoria 3" oninput="saveCats()">
<button onclick="setFilter(c3.value)">→</button>
</div>

</div>

<div id="records"></div>

<div class="bottom">
<button class="add" onclick="addRecord()">+</button>
<button class="sort" onclick="sortRecords()">ORDINA</button>
</div>

</div>

<script>

/* ===================== STORAGE ===================== */
let records = JSON.parse(localStorage.getItem("records") || "[]");
let cats = JSON.parse(localStorage.getItem("cats") || '{"c1":"","c2":"","c3":""}');
let filterCat = "TUTTI";

/* ===================== INIT CATS ===================== */
c1.value = cats.c1;
c2.value = cats.c2;
c3.value = cats.c3;

/* ===================== SAVE ===================== */
function save(){
    localStorage.setItem("records", JSON.stringify(records));
    localStorage.setItem("cats", JSON.stringify(cats));
}

function saveCats(){
    cats.c1 = c1.value;
    cats.c2 = c2.value;
    cats.c3 = c3.value;
    save();
    render();
}

/* ===================== TIMER ===================== */
let timer;
let sec = 0;

function startTimer(){
    sec = (parseInt(minuti.value)||0)*60;
    clearInterval(timer);

    timer = setInterval(()=>{
        if(sec<=0){
            clearInterval(timer);
            new Audio("rsound/rdri.mp3").play();
            return;
        }
        sec--;

        let m = Math.floor(sec/60);
        let s = sec%60;

        countdown.textContent =
        String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
    },1000);
}

function resetTimer(){
    clearInterval(timer);
    countdown.textContent="00:00";
}

/* ===================== ADD RECORD (FIX DEFINITIVO) ===================== */
function addRecord(){

    filterCat = "TUTTI"; // garantisce visibilità immediata

    records.push({
        cat:"TUTTI",
        img:"001",
        text:"",
        date:"",
        time:"",
        done:false,
        del:false
    });

    save();
    render();
}

/* ===================== IMAGE ===================== */
function imgSelect(val,i){
    let html = `<select onchange="changeImg(this.value,${i})">`;

    for(let k=1;k<=999;k++){
        let n = String(k).padStart(3,"0");
        html += `<option value="${n}" ${val==n?"selected":""}>r${n}.jpg</option>`;
    }

    html += `</select>`;
    return html;
}

function changeImg(v,i){
    records[i].img = v;
    save();
    render();
}

/* ===================== FILTER ===================== */
function setFilter(c){
    filterCat = c || "TUTTI";
    render();
}

/* ===================== DELETE ===================== */
function remove(i){
    if(records[i].del){
        records.splice(i,1);
        save();
        render();
    }
}

/* ===================== SORT ===================== */
function sortRecords(){
    records.sort((a,b)=>{
        return new Date(a.date||"9999-01-01") - new Date(b.date||"9999-01-01");
    });
    save();
    render();
}

/* ===================== RENDER STABILE ===================== */
function render(){

    let div = document.getElementById("records");
    div.innerHTML = "";

    records.forEach((r,i)=>{

        if(filterCat!=="TUTTI" && r.cat!==filterCat) return;

        let bg = r.done ? "#d6ffd6" : (r.text ? "#ffd6d6" : "white");

        let weekday = r.date ?
        new Date(r.date).toLocaleDateString("it-IT",{weekday:"long"}) : "";

        let catOptions = `
        <option ${r.cat=="TUTTI"?"selected":""}>TUTTI</option>
        <option>${cats.c1||""}</option>
        <option>${cats.c2||""}</option>
        <option>${cats.c3||""}</option>`;

        div.innerHTML += `
        <div class="record" style="background:${bg}">

        <select onchange="records[${i}].cat=this.value;save()">
            ${catOptions}
        </select>

        ${imgSelect(r.img,i)}

        <img src="rimage/r${r.img}.jpg">

        <textarea oninput="records[${i}].text=this.value;save()">${r.text}</textarea>

        <div class="smallRow">

        <input type="date" value="${r.date}"
        onchange="records[${i}].date=this.value;save()">

        <div>${weekday||"giorno"}</div>

        <input type="time" value="${r.time}"
        onchange="records[${i}].time=this.value;save()">

        </div>

        <label>
        <input type="checkbox"
        onchange="records[${i}].done=this.checked;save();render()"
        ${r.done?"checked":""}>
        <b>${r.done?"completato":"da fare"}</b>
        </label>

        <label>
        <input type="checkbox"
        onchange="records[${i}].del=this.checked;save()"
        ${r.del?"checked":""}>
        da eliminare
        </label>

        <button onclick="remove(${i})">cancella</button>

        <div class="sep"></div>

        </div>`;
    });

    save();
}

/* ===================== INIT ===================== */
if(records.length===0){
    addRecord();
}else{
    render();
}

</script>

</body>
</html>
