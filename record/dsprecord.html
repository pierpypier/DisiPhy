<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>DEBUG DSPRECORD</title>
</head>

<body style="font-family:Arial;padding:20px">

<h2>DEBUG LOCALSTORAGE</h2>

<input id="testInput" placeholder="scrivi qualcosa">
<button onclick="saveTest()">SALVA</button>
<button onclick="loadTest()">CARICA</button>

<p id="output"></p>

<hr>

<h3>RECORD TEST</h3>

<button onclick="addRecord()">+ RECORD</button>

<div id="records"></div>

<script>

/* ===================== TEST LOCALSTORAGE ===================== */

function saveTest(){
    const val = document.getElementById("testInput").value;
    localStorage.setItem("test", val);
    document.getElementById("output").innerText = "SALVATO: " + val;
}

function loadTest(){
    const val = localStorage.getItem("test");
    document.getElementById("output").innerText = "CARICATO: " + val;
}

/* ===================== RECORD SYSTEM ===================== */

let records = JSON.parse(localStorage.getItem("records") || "[]");

function saveRecords(){
    localStorage.setItem("records", JSON.stringify(records));
}

function addRecord(){

    records.push({
        text:""
    });

    saveRecords();
    render();
}

function render(){

    const box = document.getElementById("records");
    box.innerHTML = "";

    for(let i=0;i<records.length;i++){

        const div = document.createElement("div");
        div.style.margin = "10px 0";

        const input = document.createElement("input");
        input.value = records[i].text;

        input.oninput = function(){
            records[i].text = this.value;
            saveRecords();
        };

        const btn = document.createElement("button");
        btn.innerText = "X";
        btn.onclick = function(){
            records.splice(i,1);
            saveRecords();
            render();
        };

        div.appendChild(input);
        div.appendChild(btn);

        box.appendChild(div);
    }
}

/* INIT */
render();

</script>

</body>
  </html>
