<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>test dsprecord</title>

<style>
body{font-family:Arial;margin:0;padding:20px;background:#f4f6f8}
.box{background:white;padding:10px;margin-bottom:10px;border-radius:8px}
button{padding:8px 12px}
</style>
</head>

<body>

<h2 style="color:blue">TEST DSPRECORD</h2>

<!-- CATEGORIE -->
<div class="box">
<input id="c1" placeholder="Categoria 1">
<input id="c2" placeholder="Categoria 2">
<input id="c3" placeholder="Categoria 3">
</div>

<!-- RECORDS -->
<div id="records"></div>

<button onclick="addRecord()">+ NUOVO RECORD</button>

<script>

/* ===== DATA ===== */
let records = JSON.parse(localStorage.getItem("records") || "[]");

/* ===== SAVE ===== */
function save(){
localStorage.setItem("records", JSON.stringify(records));
}

/* ===== ADD RECORD ===== */
function addRecord(){

records.push({
text:""
});

save();
render();

}

/* ===== RENDER ===== */
function render(){

const box = document.getElementById("records");
box.innerHTML = "";

for(let i=0;i<records.length;i++){

const div = document.createElement("div");
div.className="box";

const input = document.createElement("input");
input.value = records[i].text;

input.oninput = function(){
records[i].text = this.value;
save();
};

const del = document.createElement("button");
del.innerText="X";
del.onclick = function(){
records.splice(i,1);
save();
render();
};

div.appendChild(input);
div.appendChild(del);
box.appendChild(div);

}

}

/* ===== INIT ===== */
render();

</script>

</body>
</html>
