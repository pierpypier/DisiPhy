<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DSP Record - Dashboard Attività</title>
  <style>
        :root{
      --bg:#f6f8fb;
      --card:#ffffff;
      --accent:#1e88e5; /* blu principale */
      --muted:#6b7280;
      --success:#dff7e6;
      --danger:#ffe6e6;
      --shadow: 0 6px 18px rgba(20,30,50,0.06);
      --radius:12px;
      --max-width:980px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background:linear-gradient(180deg,#eef4ff 0%,var(--bg) 100%);
      color:#111827;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      padding:24px;
      display:flex;
      justify-content:center;
    }
    .container{
      width:100%;
      max-width:var(--max-width);
      background:transparent;
    }

        .title-bar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:18px;
    }
    .page-title{
      font-size:20px;
      font-weight:700;
      color:var(--accent);
      letter-spacing:0.2px;
    }

        .timer-card{
      width:100%;
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
      display:flex;
      gap:12px;
      align-items:center;
      margin-bottom:16px;
      flex-wrap:wrap;
    }
    .timer-input{
      width:120px;
      min-width:100px;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid #e6e9ef;
      font-size:15px;
    }
    .btn{
      padding:10px 14px;
      border-radius:999px;
      border:none;
      cursor:pointer;
      font-weight:600;
      box-shadow:0 4px 10px rgba(16,24,40,0.06);
    }
    .btn-start{
      background:#16a34a;
      color:#fff;
      min-width:90px;
    }
    .btn-reset{
      background:#ef4444;
      color:#fff;
      min-width:90px;
    }
    .timer-display{
      font-weight:800;
      font-size:18px;
      margin-left:auto;
      color:#0f172a;
    }

        .control-card{
      width:100%;
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
      margin-bottom:16px;
    }
    .category-row{
      display:flex;
      gap:12px;
      align-items:center;
      margin-bottom:10px;
      flex-wrap:wrap;
    }
    .category-label{
      min-width:80px;
      font-weight:700;
      color:var(--muted);
    }
    .category-input{
      flex:1;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid #e6e9ef;
      font-size:15px;
      min-width:160px;
    }
    .cat-btn{
      background:#e6eefc;
      color:var(--accent);
      border-radius:10px;
      padding:8px 10px;
      border:none;
      cursor:pointer;
      font-weight:700;
    }
    .cat-btn-all{
      background:#1e88e5;
      color:#fff;
      border-radius:10px;
      padding:8px 10px;
      border:none;
      cursor:pointer;
      font-weight:700;
    }

        .records-wrap{
      display:flex;
      flex-direction:column;
      gap:14px;
      margin-bottom:18px;
    }
    .record{
      width:95%;
      margin:0 auto;
      background:var(--card);
      border-radius:12px;
      padding:14px;
      box-shadow:var(--shadow);
      transition:background 0.2s ease, border-color 0.2s ease;
    }
    .record.red-bg{ background:var(--danger); }
    .record.green-bg{ background:var(--success); }
    .record-top{
      display:flex;
      gap:12px;
      align-items:center;
      flex-wrap:wrap;
    }
    .select{
      padding:8px 10px;
      border-radius:8px;
      border:1px solid #e6e9ef;
      background:#fff;
      font-size:14px;
    }
    .img-preview{
      width:100%;
      max-height:220px;
      object-fit:cover;
      border-radius:8px;
      margin-top:10px;
      display:block;
    }
    .desc{
      width:100%;
      margin-top:10px;
      font-size:18px;
      font-weight:700;
      padding:10px;
      border-radius:8px;
      border:1px solid #e6e9ef;
      resize:vertical;
      min-height:60px;
      background:transparent;
    }
    .meta-row{
      display:flex;
      gap:10px;
      align-items:center;
      margin-top:10px;
      flex-wrap:wrap;
    }
    .input{
      padding:8px 10px;
      border-radius:8px;
      border:1px solid #e6e9ef;
      font-size:14px;
    }
    .weekday{
      padding:8px 10px;
      border-radius:8px;
      border:1px dashed #d1d5db;
      background:#fff;
      min-width:140px;
      text-align:center;
      color:var(--muted);
      font-weight:600;
    }
    .flags{
      display:flex;
      gap:12px;
      align-items:center;
      margin-top:10px;
      flex-wrap:wrap;
    }
    .flag{
      display:flex;
      gap:8px;
      align-items:center;
      font-weight:700;
      color:var(--muted);
    }
    .flag input{transform:scale(1.1)}
    .delete-btn{
      background:#9ca3af;
      color:#fff;
      border-radius:10px;
      padding:8px 12px;
      border:none;
      cursor:pointer;
      font-weight:700;
    }
    .separator{
      height:1px;
      background:#e6e9ef;
      margin-top:12px;
      border-radius:2px;
    }

        .actions{
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:center;
      margin-top:8px;
      margin-bottom:40px;
      flex-wrap:wrap;
    }
    .create-btn{
      width:56px;
      height:56px;
      border-radius:50%;
      background:#6b7280;
      color:#fff;
      font-size:28px;
      display:flex;
      align-items:center;
      justify-content:center;
      border:none;
      cursor:pointer;
      box-shadow:var(--shadow);
    }
    .sort-btn{
      width:120px;
      height:56px;
      border-radius:50%;
      background:var(--accent);
      color:#fff;
      font-weight:800;
      border:none;
      cursor:pointer;
      box-shadow:var(--shadow);
    }

        @media (max-width:640px){
      .timer-display{width:100%; text-align:left; margin-left:0}
      .record{width:100%}
      .weekday{min-width:120px}
    }

        .muted{color:var(--muted); font-weight:600}
    .small{font-size:13px; color:var(--muted)}
  </style>
</head>
<body>
  <div class="container" id="app">
        <div class="title-bar">
      <div class="page-title">TITOLO PAGINA</div>
      <!-- Spazio riservato per future aggiunte -->
      <div class="small">Dashboard leggera per record attività</div>
    </div>

        <div class="timer-card" id="timerCard">
      <!-- 03 Input minuti -->
      <input id="timerMinutes" class="timer-input" type="number" min="1" placeholder="minuti" />
      <!-- 04 Pulsante START -->
      <button id="startTimer" class="btn btn-start">START</button>
      <!-- 05 Pulsante RESET -->
      <button id="resetTimer" class="btn btn-reset">RESET</button>
      <!-- 06 Conto alla rovescia -->
      <div id="timerDisplay" class="timer-display">00:00</div>
    </div>

        <div class="control-card" id="controlCard">
      <!-- Categoria TUTTI (07) -->
      <div class="category-row">
        <div class="category-label">TUTTI</div>
        <div style="flex:1">
          <div class="muted">TUTTI</div>
        </div>
        <!-- Bottone freccia destra per mostrare tutti (08) -->
        <button class="cat-btn-all" data-filter="TUTTI">→ MOSTRA TUTTI</button>
      </div>

      <!-- Categoria 1 (09) -->
      <div class="category-row">
        <div class="category-label">Categoria 1</div>
        <input id="cat1" class="category-input" type="text" placeholder="Categoria 1" />
        <button class="cat-btn" data-filter-index="1">→</button>
      </div>

      <!-- Categoria 2 (11) -->
      <div class="category-row">
        <div class="category-label">Categoria 2</div>
        <input id="cat2" class="category-input" type="text" placeholder="Categoria 2" />
        <button class="cat-btn" data-filter-index="2">→</button>
      </div>

      <!-- Categoria 3 (13) -->
      <div class="category-row">
        <div class="category-label">Categoria 3</div>
        <input id="cat3" class="category-input" type="text" placeholder="Categoria 3" />
        <button class="cat-btn" data-filter-index="3">→</button>
      </div>
    </div>
    <div class="records-wrap" id="recordsWrap">
      <!-- I record verranno generati dinamicamente via JavaScript -->
    </div>

    <div class="actions">
      <button id="createRecord" class="create-btn" title="Crea nuovo record">+</button>
      <button id="sortRecords" class="sort-btn" title="Ordina per data crescente">ORDINA</button>
    </div>
  </div>

    <script>
        const LS_KEYS = {
      categories: 'dsp_categories_v1',
      records: 'dsp_records_v1',
      timer: 'dsp_timer_v1'
    };

        let state = {
      categories: ['TUTTI', 'Categoria 1', 'Categoria 2', 'Categoria 3'],
      records: [],
      timer: { minutes: 0, running: false, remainingSec: 0 }
    };

        const timerMinutesInput = document.getElementById('timerMinutes');
    const startTimerBtn = document.getElementById('startTimer');
    const resetTimerBtn = document.getElementById('resetTimer');
    const timerDisplay = document.getElementById('timerDisplay');

    const catInputs = [
      document.getElementById('cat1'),
      document.getElementById('cat2'),
      document.getElementById('cat3')
    ];

    const recordsWrap = document.getElementById('recordsWrap');
    const createRecordBtn = document.getElementById('createRecord');
    const sortRecordsBtn = document.getElementById('sortRecords');
    const controlCard = document.getElementById('controlCard');

        const timerAudio = new Audio('rsound/rdri.mp3');

        function loadState(){
      try{
        const cats = localStorage.getItem(LS_KEYS.categories);
        const recs = localStorage.getItem(LS_KEYS.records);
        const tmr = localStorage.getItem(LS_KEYS.timer);

        if(cats) state.categories = JSON.parse(cats);
        if(recs) state.records = JSON.parse(recs);
        if(tmr) state.timer = JSON.parse(tmr);

        // Se non ci sono record, creane uno di default con categoria TUTTI
        if(!state.records || state.records.length === 0){
          const defaultRecord = createRecordObject({
            category: 'TUTTI',
            image: 'r001.jpg',
            description: 'Esempio attività - modifica questo testo',
            date: '',
            time: '',
            completed: false,
            toDelete: false
          });
          state.records = [defaultRecord];
          saveState();
        }
      }catch(e){
        console.error('Errore caricamento stato', e);
      }
    }

        function saveState(){
      localStorage.setItem(LS_KEYS.categories, JSON.stringify(state.categories));
      localStorage.setItem(LS_KEYS.records, JSON.stringify(state.records));
      localStorage.setItem(LS_KEYS.timer, JSON.stringify(state.timer));
    }

        function uid(){
      return 'r_' + Date.now() + '_' + Math.floor(Math.random()*9999);
    }

        function createRecordObject({category='TUTTI', image='r001.jpg', description='', date='', time='', completed=false, toDelete=false} = {}){
      return {
        id: uid(),
        category,
        image,
        description,
        date,
        time,
        completed,
        toDelete
      };
    }
  function render(){
      // Aggiorna campi categorie (cat1, cat2, cat3)
      catInputs.forEach((el, idx) => {
        el.value = state.categories[idx+1] || '';
      });

      // Render records
      recordsWrap.innerHTML = '';
      state.records.forEach(rec => {
        const recEl = buildRecordElement(rec);
        recordsWrap.appendChild(recEl);
      });

      // Timer input e display
      timerMinutesInput.value = state.timer.minutes || '';
      updateTimerDisplay(state.timer.remainingSec || 0);
    }

        function buildRecordElement(rec){
      const wrapper = document.createElement('div');
      wrapper.className = 'record';
      wrapper.dataset.id = rec.id;

      // Cambia sfondo se descrizione presente o completato
      if(rec.description && rec.description.trim().length > 0){
        wrapper.classList.add('red-bg');
      }
      if(rec.completed){
        wrapper.classList.remove('red-bg');
        wrapper.classList.add('green-bg');
      }

      // Top row: categorie e immagine selezione
      const top = document.createElement('div');
      top.className = 'record-top';

      // 16 Menù a tendina categorie
      const catSelect = document.createElement('select');
      catSelect.className = 'select';
      catSelect.title = 'Seleziona categoria';
      // Popola opzioni dalle categorie correnti
      state.categories.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat;
        if(cat === rec.category) opt.selected = true;
        catSelect.appendChild(opt);
      });
      catSelect.addEventListener('change', () => {
        rec.category = catSelect.value;
        persistRecord(rec);
      });
      top.appendChild(catSelect);
          // 17 Menù a tendina per selezione immagine
      const imgSelect = document.createElement('select');
      imgSelect.className = 'select';
      imgSelect.title = 'Seleziona immagine (rimage/r001.jpg ... r999.jpg)';
      // Genera opzioni dinamicamente (r001..r999)
      // Per performance, generiamo solo fino a 200 opzioni visibili, ma l'utente può digitare il nome manualmente.
      // Tuttavia per rispettare la richiesta generiamo tutte le opzioni (999) ma in modo efficiente.
      for(let i=1;i<=999;i++){
        const num = String(i).padStart(3,'0');
        const filename = `r${num}.jpg`;
        const opt = document.createElement('option');
        opt.value = filename;
        opt.textContent = filename;
        if(filename === rec.image) opt.selected = true;
        imgSelect.appendChild(opt);
      }
      imgSelect.addEventListener('change', () => {
        rec.image = imgSelect.value;
        // aggiorna preview immagine
        imgPreview.src = `rimage/${rec.image}`;
        persistRecord(rec);
      });
      top.appendChild(imgSelect);

      wrapper.appendChild(top);

      // 18 Immagine preview
      const imgPreview = document.createElement('img');
      imgPreview.className = 'img-preview';
      imgPreview.alt = 'Anteprima immagine';
      imgPreview.src = `rimage/${rec.image}`;
      // Se l'immagine non esiste, il browser mostrerà un placeholder rotto; l'utente può comunque cambiare.
      wrapper.appendChild(imgPreview);

      // 19 Textarea descrizione
      const desc = document.createElement('textarea');
      desc.className = 'desc';
      desc.placeholder = 'Descrizione attività...';
      desc.value = rec.description || '';
      desc.addEventListener('input', () => {
        rec.description = desc.value;
        // se c'è testo, sfondo record rosso chiaro
        if(rec.description && rec.description.trim().length > 0){
          wrapper.classList.add('red-bg');
        }else{
          wrapper.classList.remove('red-bg');
        }
        // se completato, prevale il verde
        if(rec.completed){
          wrapper.classList.remove('red-bg');
          wrapper.classList.add('green-bg');
        }
        persistRecord(rec);
      });
      wrapper.appendChild(desc);

      // Meta row: data, giorno settimana, ora
      const meta = document.createElement('div');
      meta.className = 'meta-row';
      // 20 Input data
      const dateInput = document.createElement('input');
      dateInput.type = 'date';
      dateInput.className = 'input';
      dateInput.value = rec.date || '';
      dateInput.placeholder = 'inserisci data e ora';
      dateInput.addEventListener('change', () => {
        rec.date = dateInput.value;
        // aggiorna giorno della settimana
        weekdayDiv.textContent = rec.date ? getWeekdayName(rec.date) : 'inserisci data e ora';
        persistRecord(rec);
      });
      meta.appendChild(dateInput);

      // 21 Giorno della settimana (calcolato)
      const weekdayDiv = document.createElement('div');
      weekdayDiv.className = 'weekday';
      weekdayDiv.textContent = rec.date ? getWeekdayName(rec.date) : 'inserisci data e ora';
      meta.appendChild(weekdayDiv);

      // 22 Input ora
      const timeInput = document.createElement('input');
      timeInput.type = 'time';
      timeInput.className = 'input';
      timeInput.value = rec.time || '';
      timeInput.addEventListener('change', () => {
        rec.time = timeInput.value;
        persistRecord(rec);
      });
      meta.appendChild(timeInput);

      wrapper.appendChild(meta);
      // Flags (23 completato, 24 da eliminare)
      const flags = document.createElement('div');
      flags.className = 'flags';

      // 23 Flag completato
      const flagCompleted = document.createElement('label');
      flagCompleted.className = 'flag';
      const chkCompleted = document.createElement('input');
      chkCompleted.type = 'checkbox';
      chkCompleted.checked = !!rec.completed;
      chkCompleted.addEventListener('change', () => {
        rec.completed = chkCompleted.checked;
        // Aggiorna sfondo
        if(rec.completed){
          wrapper.classList.remove('red-bg');
          wrapper.classList.add('green-bg');
        }else{
          wrapper.classList.remove('green-bg');
          if(rec.description && rec.description.trim().length > 0){
            wrapper.classList.add('red-bg');
          }
        }
        persistRecord(rec);
      });
      const completedText = document.createElement('span');
      completedText.textContent = rec.completed ? 'completato' : 'da fare';
      completedText.style.fontWeight = '800';
      // Aggiorna testo quando cambia
      chkCompleted.addEventListener('change', () => {
        completedText.textContent = chkCompleted.checked ? 'completato' : 'da fare';
      });
      flagCompleted.appendChild(chkCompleted);
      flagCompleted.appendChild(completedText);
      flags.appendChild(flagCompleted);
      // 24 Flag da eliminare
      const flagDelete = document.createElement('label');
      flagDelete.className = 'flag';
      const chkDelete = document.createElement('input');
      chkDelete.type = 'checkbox';
      chkDelete.checked = !!rec.toDelete;
      chkDelete.addEventListener('change', () => {
        rec.toDelete = chkDelete.checked;
        persistRecord(rec);
      });
      const deleteText = document.createElement('span');
      deleteText.textContent = 'da eliminare';
      deleteText.style.fontWeight = '800';
      flagDelete.appendChild(chkDelete);
      flagDelete.appendChild(deleteText);
      flags.appendChild(flagDelete);

      wrapper.appendChild(flags);

      // 25 Pulsante cancella (elimina solo se flag "da eliminare" è attivo)
      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.textContent = 'CANCELLA';
      delBtn.addEventListener('click', () => {
        if(rec.toDelete){
          // elimina record dallo stato
          state.records = state.records.filter(r => r.id !== rec.id);
          saveState();
          render();
        }else{
          // se non è flaggato, evidenzia brevemente
          delBtn.animate([{transform:'scale(1)'},{transform:'scale(1.05)'},{transform:'scale(1)'}],{duration:220});
        }
      });
      wrapper.appendChild(delBtn);
      // 26 Separatore
      const sep = document.createElement('div');
      sep.className = 'separator';
      wrapper.appendChild(sep);

      // Imposta valori iniziali per date/ora
      dateInput.value = rec.date || '';
      timeInput.value = rec.time || '';

      return wrapper;
    }

        function persistRecord(rec){
      const idx = state.records.findIndex(r => r.id === rec.id);
      if(idx >= 0){
        state.records[idx] = rec;
      }else{
        state.records.push(rec);
      }
      saveState();
      // re-render per aggiornare eventuali classi
      render();
    }

        function getWeekdayName(dateStr){
      if(!dateStr) return '';
      const d = new Date(dateStr + 'T00:00:00');
      const days = ['domenica','lunedì','martedì','mercoledì','giovedì','venerdì','sabato'];
      return days[d.getDay()];
    }

    
    let timerInterval = null;

    function updateTimerDisplay(sec){
      const m = Math.floor(sec/60);
      const s = sec % 60;
      timerDisplay.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function startTimer(){
      const minutes = parseInt(timerMinutesInput.value,10);
      if(isNaN(minutes) || minutes <= 0){
        alert('Inserisci un numero di minuti valido.');
        return;
      }
      // Imposta stato timer
      state.timer.minutes = minutes;
      state.timer.remainingSec = minutes * 60;
      state.timer.running = true;
      saveState();
      // Avvia intervallo
      if(timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if(state.timer.remainingSec > 0){
          state.timer.remainingSec--;
          updateTimerDisplay(state.timer.remainingSec);
          saveState();
        }else{
          // Fine timer
          clearInterval(timerInterval);
          timerInterval = null;
          state.timer.running = false;
          saveState();
          updateTimerDisplay(0);
          // Riproduci suono
          try{ timerAudio.play(); }catch(e){ console.warn('Impossibile riprodurre audio', e); }
        }
      }, 1000);
      updateTimerDisplay(state.timer.remainingSec);
    }

    function resetTimer(){
      if(timerInterval) clearInterval(timerInterval);
      timerInterval = null;
      state.timer.running = false;
      state.timer.remainingSec = 0;
      state.timer.minutes = 0;
      saveState();
      updateTimerDisplay(0);
      timerMinutesInput.value = '';
    }

    // Crea nuovo record e lo aggiunge in cima alla lista
    function createNewRecord(){
      const newRec = createRecordObject({
        category: state.categories[0] || 'TUTTI',
        image: 'r001.jpg',
        description: '',
        date: '',
        time: '',
        completed: false,
        toDelete: false
      });
      // Aggiungi in cima
      state.records.unshift(newRec);
      saveState();
      render();
      // scrolla al nuovo record
      setTimeout(()=> {
        const el = document.querySelector(`[data-id="${newRec.id}"]`);
        if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
      },120);
      }
      // Ordina i record per data crescente (se data vuota considerata infinita)
    function sortRecordsByDate(){
      state.records.sort((a,b) => {
        if(!a.date && !b.date) return 0;
        if(!a.date) return 1;
        if(!b.date) return -1;
        // confronta date e poi orario
        const da = new Date(a.date + 'T' + (a.time || '00:00'));
        const db = new Date(b.date + 'T' + (b.time || '00:00'));
        return da - db;
      });
      saveState();
      render();
    }

    // Filtra e mostra solo i record di una categoria (o tutti)
    function filterByCategory(cat){
      // Renderizza tutti i record ma nasconde quelli che non corrispondono
      render(); // prima render per assicurare elementi presenti
      const recEls = document.querySelectorAll('.record');
      recEls.forEach(el => {
        const id = el.dataset.id;
        const rec = state.records.find(r => r.id === id);
        if(!rec) return;
        if(cat === 'TUTTI' || rec.category === cat){
          el.style.display = '';
        }else{
          el.style.display = 'none';
        }
      });
    }

        function updateCategoriesFromInputs(){
      // state.categories[0] rimane 'TUTTI'
      state.categories[0] = 'TUTTI';
      state.categories[1] = catInputs[0].value.trim() || 'Categoria 1';
      state.categories[2] = catInputs[1].value.trim() || 'Categoria 2';
      state.categories[3] = catInputs[2].value.trim() || 'Categoria 3';
      saveState();
      render();
    }

        function initEventListeners(){
      // Timer
      startTimerBtn.addEventListener('click', () => {
        startTimer();
      });
      resetTimerBtn.addEventListener('click', () => {
        resetTimer();
      });

      // Salva valore minuti quando cambia
      timerMinutesInput.addEventListener('change', () => {
        const m = parseInt(timerMinutesInput.value,10);
        state.timer.minutes = isNaN(m) ? 0 : m;
        state.timer.remainingSec = state.timer.minutes * 60;
        saveState();
        updateTimerDisplay(state.timer.remainingSec || 0);
      });

      // Categorie inputs: salva on input (tutte le modifiche devono essere salvate)
      catInputs.forEach(inp => {
        inp.addEventListener('input', () => {
          updateCategoriesFromInputs();
        });
      });

      // Bottoni filtro (08,10,12,14)
      controlCard.addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if(!btn) return;
        // Bottone MOSTRA TUTTI
        if(btn.dataset.filter === 'TUTTI'){
          filterByCategory('TUTTI');
          return;
        }
        // Bottone con data-filter-index
        if(btn.dataset.filterIndex){
          const idx = parseInt(btn.dataset.filterIndex,10);
          const cat = state.categories[idx] || '';
          filterByCategory(cat);
        }
      });
        // Crea record (27)
      createRecordBtn.addEventListener('click', () => {
        createNewRecord();
      });

      // Ordina record (28)
      sortRecordsBtn.addEventListener('click', () => {
        sortRecordsByDate();
      });

      // Event listener globale per aggiornare dropdown categorie quando cambiano (utile se si aggiungono record dinamicamente)
      window.addEventListener('storage', (e) => {
        // Se lo stato è cambiato in un'altra scheda, ricarica
        if(e.key === LS_KEYS.categories || e.key === LS_KEYS.records || e.key === LS_KEYS.timer){
          loadState();
          render();
        }
      });
    }

        loadState();
    initEventListeners();
    render();

      </script>
</body>
</html>
