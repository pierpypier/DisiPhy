<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dsprecord</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6f8;
}

.container{
width:95%;
max-width:1000px;
margin:auto;
}

.title{
text-align:center;
color:#1e5bd8;
font-size:28px;
font-weight:bold;
padding:15px;
}

.panel{
background:white;
padding:10px;
margin:10px 0;
border-radius:10px;
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
align-items:center;
margin:5px 0;
}

.record{
background:white;
padding:12px;
margin:12px 0;
border-radius:10px;
}

textarea{
width:100%;
font-size:18px;
font-weight:bold;
resize:vertical;
}

img{
width:95%;
display:block;
margin:auto;
}

button{
padding:6px 10px;
border-radius:6px;
border:1px solid #ccc;
cursor:pointer;
}

.addBtn{
background:#666;
color:white;
border:none;
border-radius:50%;
width:55px;
height:55px;
font-size:26px;
}

.sortBtn{
background:blue;
color:white;
border:none;
border-radius:20px;
padding:10px 15px;
}
</style>
</head>

<body>

<div class="container">

<div class="title">DSP RECORD</div>

<!-- TIMER -->
<div class="panel">
<div class="row">
<input id="minuti" type="number" placeholder="minuti">
<button id="start">START</button>
<button id="reset">RESET</button>
<div id="countdown">00:00</div>
</div>
</div>

<!-- CATEGORIE -->
<div class="panel">
<div class="row">
<input value="TUTTI" disabled>
<button class="filter" data-filter="TUTTI">→</button>
</div>

<div class="row">
<input id="c1" placeholder="Categoria 1">
<button class="filter" data-target="c1">→</button>
</div>

<div class="row">
<input id="c2" placeholder="Categoria 2">
<button class="filter" data-target="c2">→</button>
</div>

<div class="row">
<input id="c3" placeholder="Categoria 3">
<button class="filter" data-target="c3">→</button>
</div>
</div>

<!-- RECORDS -->
<div id="box"></div>

<div class="row" style="justify-content:center">
<button id="add" class="addBtn">+</button>
<button id="sort" class="sortBtn">ORDINA</button>
</div>

</div>

<script>

/* ================= STATE ================= */
let records = JSON.parse(localStorage.getItem("records") || "[]");
let filter = "TUTTI";

/* ================= SAVE ================= */
function save(){
localStorage.setItem("records", JSON.stringify(records));
}

/* ================= TIMER ================= */
let timer;
let sec = 0;

document.getElementById("start").addEventListener("click", () => {
sec = (parseInt(document.getElementById("minuti").value)||0)*60;

clearInterval(timer);

timer = setInterval(() => {
if(sec <= 0){
clearInterval(timer);
new Audio("rsound/rdri.mp3").play();
return;
}

sec--;

document.getElementById("countdown").textContent =
String(Math.floor(sec/60)).padStart(2,"0")+":"+
String(sec%60).padStart(2,"0");

},1000);
});

document.getElementById("reset").addEventListener("click", () => {
clearInterval(timer);
document.getElementById("countdown").textContent = "00:00";
});

/* ================= FILTER ================= */
document.querySelectorAll(".filter").forEach(btn => {
btn.addEventListener("click", () => {

if(btn.dataset.filter){
filter = btn.dataset.filter;
}
if(btn.dataset.target){
let el = document.getElementById(btn.dataset.target);
filter = el.value || "TUTTI";
}

render();

});
});

/* ================= ADD RECORD ================= */
document.getElementById("add").addEventListener("click", () => {

records.push({
cat:"TUTTI",
img:"001",
text:"",
date:"",
time:"",
done:false,
del:false
});

save();
render();

});

/* ================= SORT ================= */
document.getElementById("sort").addEventListener("click", () => {

records.sort((a,b)=>
new Date(a.date||"9999-01-01") - new Date(b.date||"9999-01-01")
);

save();
render();

});

/* ================= IMAGES ================= */
function imgOptions(val){
let html="";
for(let i=1;i<=999;i++){
let n=String(i).padStart(3,"0");
html += `<option value="${n}" ${val==n?"selected":""}>r${n}.jpg</option>`;
}
return html;
}

/* ================= RENDER ================= */
function render(){

const box = document.getElementById("box");
box.innerHTML = "";

records.forEach((r,i) => {

if(filter !== "TUTTI" && r.cat !== filter) return;

const div = document.createElement("div");
div.className = "record";

div.style.background = r.done ? "#d6ffd6" : (r.text ? "#ffd6d6" : "white");

/* CATEGORY */
const cat = document.createElement("select");
cat.innerHTML = `
<option ${r.cat=="TUTTI"?"selected":""}>TUTTI</option>
<option>${c1.value||""}</option>
<option>${c2.value||""}</option>
<option>${c3.value||""}</option>
`;

cat.addEventListener("change", e=>{
records[i].cat = e.target.value;
save();
});

/* IMAGE */
const img = document.createElement("select");
img.innerHTML = imgOptions(r.img);

img.addEventListener("change", e=>{
records[i].img = e.target.value;
save();
});

/* TEXT */
const ta = document.createElement("textarea");
ta.value = r.text;

ta.addEventListener("input", e=>{
records[i].text = e.target.value;
save();
});

/* DATE */
const date = document.createElement("input");
date.type="date";
date.value=r.date;

date.addEventListener("change", e=>{
records[i].date = e.target.value;
save();
});

/* TIME */
const time = document.createElement("input");
time.type="time";
time.value=r.time;

time.addEventListener("change", e=>{
records[i].time = e.target.value;
save();
});

/* DONE */
const done = document.createElement("input");
done.type="checkbox";
done.checked=r.done;

done.addEventListener("change", e=>{
records[i].done = e.target.checked;
save();
render();
});

/* DELETE */
const del = document.createElement("input");
del.type="checkbox";
del.checked=r.del;

del.addEventListener("change", e=>{
records[i].del = e.target.checked;
save();
});

/* BUTTON DELETE */
const btn = document.createElement("button");
btn.textContent="cancella";

btn.addEventListener("click", () => {
if(records[i].del){
records.splice(i,1);
save();
render();
}
});

/* IMAGE */
const image = document.createElement("img");
image.src = "rimage/r"+r.img+".jpg";

/* APPEND */
div.appendChild(cat);
div.appendChild(img);
div.appendChild(image);
div.appendChild(ta);
div.appendChild(date);
div.appendChild(time);
div.appendChild(done);
div.appendChild(del);
div.appendChild(btn);

box.appendChild(div);

});

}

/* ================= INIT ================= */
if(records.length === 0){
records.push({
cat:"TUTTI",
img:"001",
text:"",
date:"",
time:"",
done:false,
del:false
});
save();
}

render();

</script>

</body>
  </html>
