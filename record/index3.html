<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Record attività</title>
<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:0;
    background:#f4f4f4;
}
.container{
    max-width:900px;
    margin:auto;
    padding:10px;
}
h1{
    text-align:center;
}

/* TIMER */
.timer-box{
    text-align:center;
    margin:20px 0;
}
.timer-input{
    font-size:20px;
    width:120px;
    padding:6px;
    text-align:center;
}
.start-btn{
    width:80px;
    height:80px;
    border-radius:50%;
    background:green;
    color:white;
    font-size:18px;
    border:none;
    margin-left:10px;
    cursor:pointer;
}
.start-btn:active{
    transform:scale(0.95);
}

/* IMAGE */
.record-image{
    width:100%;
    max-height:250px;
    object-fit:cover;
    border:3px solid #ccc;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
    margin-bottom:10px;
}
.image-select{
    width:100%;
    padding:6px;
    margin-bottom:10px;
}

/* RECORD */
.record{
    background:white;
    padding:10px;
    border-radius:8px;
}
.record.completed{
    background:#d4edda;
    border-left:6px solid green;
}
.record.pending{
    background:#ffe5e5;
    border-left:6px solid #cc0000;
}
.separator{
    height:2px;
    background:#ccc;
    margin:10px 0;
}
textarea{
    width:100%;
    min-height:60px;
    resize:vertical;
    padding:5px;
}
.row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:5px;
}
.status{
    font-weight:bold;
    margin-top:5px;
}
#timerDisplay{
    margin-top:10px;
    font-size:20px;
}

/* MOBILE */
@media(max-width:600px){
.start-btn{
    width:70px;
    height:70px;
}
}
</style>
</head>
<body>
<div class="container">
<h1>AGENDA ATTIVITÀ</h1>
<div class="timer-box">
<input type="number" id="timerSeconds" class="timer-input" placeholder="secondi">
<button class="start-btn" onclick="startTimer()">Start</button>
<div id="timerDisplay"></div>
</div>

<div id="records"></div>
</div>
<audio id="alarm" src="rsound/rdri.mp3"></audio>

<script>
/* TIMER */
let timerInterval;
function startTimer(){
    let seconds = parseInt(document.getElementById("timerSeconds").value);
    if(!seconds) return;
    localStorage.setItem("timerSeconds", seconds);
    let display = document.getElementById("timerDisplay");
    clearInterval(timerInterval);
    timerInterval = setInterval(()=>{
        seconds--;
        display.innerText = seconds + " sec";
        if(seconds <= 0){
            clearInterval(timerInterval);
            display.innerText = "Tempo finito";
            document.getElementById("alarm").play();
        }
    },1000);
}

/* RECORD CREATION */
let container = document.getElementById("records");
for(let i=1;i<=30;i++){
    let div = document.createElement("div");
    div.className = "record";
    div.innerHTML = `
        <select id="imgSelect${i}" class="image-select"></select>
        <img id="img${i}" class="record-image" src="rimage/r001.jpg">
        <input type="checkbox" id="flag${i}"> completato
        <textarea id="desc${i}" placeholder="descrizione attività"></textarea>
        <div class="row">
            <input type="date" id="date${i}">
            <span id="day${i}"></span>
            <input type="time" id="time${i}">
        </div>
        <div class="status" id="status${i}">da eseguire</div>
    `;
    container.appendChild(div);
    let sep = document.createElement("div");
    sep.className = "separator";
    container.appendChild(sep);

    // POPOLA IL MENU IMMAGINI
    let selectImg = document.getElementById("imgSelect"+i);
    for(let j=1;j<=100;j++){
        let num = j.toString().padStart(3,'0');
        let option = document.createElement("option");
        option.value = "rimage/r"+num+".jpg";
        option.text = "r"+num;
        selectImg.appendChild(option);
    }
    selectImg.onchange = function(){
        document.getElementById("img"+i).src = this.value;
        localStorage.setItem("recordImage"+i, this.value);
    }
}

/* COLORI RECORD */
function updateRecordColor(i){
    let record = document.getElementById("flag"+i).closest(".record");
    let flag = document.getElementById("flag"+i).checked;
    let text = document.getElementById("desc"+i).value.trim();
    record.classList.remove("completed");
    record.classList.remove("pending");
    if(flag){
        record.classList.add("completed");
        document.getElementById("status"+i).innerText = "completato";
    }else if(text.length>0){
        record.classList.add("pending");
        document.getElementById("status"+i).innerText = "da eseguire";
    }else{
        document.getElementById("status"+i).innerText = "da eseguire";
    }
}

/* EVENTI */
for(let i=1;i<=30;i++){
    let dateField = document.getElementById("date"+i);
    let flagField = document.getElementById("flag"+i);
    let descField = document.getElementById("desc"+i);

    dateField.onchange = function(){
        let d = new Date(this.value);
        let days = ["Domenica","Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato"];
        document.getElementById("day"+i).innerText = days[d.getDay()];
        updateRecordColor(i);
        saveData();
    }
    flagField.onchange = function(){
        updateRecordColor(i);
        saveData();
    }
    descField.oninput = function(){
        updateRecordColor(i);
        saveData();
    }
}

/* SAVE DATA */
function saveData(){
    let data = {};
    for(let i=1;i<=30;i++){
        data["flag"+i] = document.getElementById("flag"+i).checked;
        data["desc"+i] = document.getElementById("desc"+i).value;
        data["date"+i] = document.getElementById("date"+i).value;
        data["time"+i] = document.getElementById("time"+i).value;
        data["day"+i] = document.getElementById("day"+i).innerText;
        data["img"+i] = document.getElementById("img"+i).src;
    }
    localStorage.setItem("records", JSON.stringify(data));
}

/* LOAD DATA */
function loadData(){
    let data = JSON.parse(localStorage.getItem("records"));
    if(data){
        for(let i=1;i<=30;i++){
            document.getElementById("flag"+i).checked = data["flag"+i];
            document.getElementById("desc"+i).value = data["desc"+i];
            document.getElementById("date"+i).value = data["date"+i];
            document.getElementById("time"+i).value = data["time"+i];
            document.getElementById("day"+i).innerText = data["day"+i];
            if(data["img"+i]){
                document.getElementById("img"+i).src = data["img"+i];
                document.getElementById("imgSelect"+i).value = data["img"+i];
            }
            updateRecordColor(i);
        }
    }
    let timer = localStorage.getItem("timerSeconds");
    if(timer){
        document.getElementById("timerSeconds").value = timer;
    }
}

document.addEventListener("input", saveData);
loadData();
</script>
</body>
  </html>
