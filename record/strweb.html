<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Strumenti Web</title>

<style>
:root{
  --bg:#f6f8fb;
  --card:#ffffff;
  --accent:#1e88e5;
  --muted:#6b7280;
  --danger:#ef4444;
  --shadow:0 8px 24px rgba(20,30,50,0.06);
  --radius:12px;
  --max-width:980px;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,system-ui,Arial,Helvetica,sans-serif;
  background:linear-gradient(180deg,#eef4ff 0%,var(--bg) 100%);
  padding:20px;
  display:flex;
  justify-content:center;
  color:#0f172a;
}
.container{ width:100%; max-width:var(--max-width); }

.card{
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:18px;
  margin-bottom:18px;
}

.title-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:12px;
}
.title{
  font-size:20px;
  font-weight:800;
  color:var(--accent);
}
.subtitle{ font-size:14px; color:var(--muted); font-weight:600; }

.controls{
  display:flex;
  gap:12px;
}
.btn{
  padding:10px 14px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-weight:700;
  color:#fff;
  background:var(--accent);
  box-shadow:var(--shadow);
}
.btn.alt{ background:var(--muted); }

.list-wrap{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.item{
  background:#fff;
  border-radius:10px;
  border:1px solid #eef2f7;
  padding:12px;
  box-shadow:0 6px 18px rgba(20,30,50,0.04);
  transition:transform .12s ease;
}
.item:hover{ transform:translateY(-4px); }

.item.dragging{ opacity:0.4; }
.item.drag-over{ border:2px dashed var(--accent); }

.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

input[type="text"]{
  flex:1;
  padding:10px;
  border-radius:8px;
  border:1px solid #e6e9ef;
  font-size:15px;
  font-weight:600;
}

/* Categoria: testo color #227A7B */
input.cat-input{
  color: #227A7B;
  border: 1px solid #d7e9e9;
  background: #ffffff;
  font-weight:700;
}
input.cat-input::placeholder{ color: rgba(34,122,123,0.45); }

/* URL: testo color #E3DCC9 */
input.url-input{
  color: #E3DCC9;
  border: 1px solid #e9e3d6;
  background: #ffffff;
  font-weight:600;
}
input.url-input::placeholder{ color: rgba(227,220,201,0.6); }

/* verde chiaro per l'input Titolo (colore richiesto #C3D2BF) */
input.title-input{
  background: #C3D2BF;
  border: 1px solid #AFC6A8;
  color: #0b3b18;
  font-weight:700;
  border-radius:8px;
  padding:10px;
}

/* stato focus più evidente */
input.title-input:focus{
  outline: 3px solid rgba(195,210,191,0.28);
  box-shadow: 0 4px 12px rgba(46,160,67,0.06);
}

.go-btn{
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:50%;
  width:48px;
  height:48px;
  font-weight:800;
  cursor:pointer;
  box-shadow:0 6px 18px rgba(20,30,50,0.08);
}

.meta{
  display:flex;
  align-items:center;
  gap:12px;
}

.flag{
  display:flex;
  align-items:center;
  gap:6px;
  font-weight:700;
  color:var(--muted);
}
.flag input{
  width:18px;
  height:18px;
  accent-color:var(--accent);
}

.delete-btn{
  margin-left:auto;
  background:var(--danger);
  color:#fff;
  border:none;
  padding:8px 10px;
  border-radius:8px;
  cursor:pointer;
  font-weight:800;
}
.delete-btn.disabled{
  opacity:0.4;
  cursor:not-allowed;
}

.handle{
  opacity:0.6;
  font-size:14px;
  margin-left:8px;
}

.empty{
  text-align:center;
  color:var(--muted);
  padding:18px;
  border-radius:10px;
  border:1px dashed #e6e9ef;
  background:linear-gradient(180deg, rgba(230,236,255,0.4), rgba(250,250,250,0.4));
}

      /* stile barra di navigazione */
.nav {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 5px 0;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-decoration: none;
  color: #000;
  font-size: 14px;
  transition: opacity 0.2s ease;
}

.nav-item img {
  width: 84px;
  height: 84px;
  margin-bottom: 1px;
  transition: transform 0.2s ease;
}

.nav-item:hover img {
  transform: scale(1.05);
}

.nav-item:hover {
  opacity: 0.85;
}

/* Responsive */
@media (max-width: 600px) {
  .nav {
    gap: 10px;
  }

  .nav-item img {
    width: 60px;
    height: 60px;
  }

  .nav-item span {
    font-size: 12px;
  }
}
    
    /* fine stile barra di navigazione */

    
    
</style>
</head>

<body>
<div class="container">
  
<!-- barra navigazione -->
<nav class="nav">

  <div class="card">
    <div class="title-row">
      

      <div>
        <div class="title">Strumenti Web</div>
        <div class="subtitle">Gestione Preferiti</div>
      </div>

      
      <div class="controls">
        <button id="createBtn" class="btn">Crea</button>
      </div>
    </div>

    <div id="list" class="list-wrap" role="list"></div>

    <div id="emptyNote" class="empty" style="display:none;">
      Nessuno strumento. Premi <strong>Crea</strong> per aggiungerne uno.
    </div>
  </div>

</div>

<script>
const LS_KEY = "webtools_v1";
let state = { items: [] };

function loadState(){
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(raw) state = JSON.parse(raw);
  } catch (err) {
    console.warn("Errore parsing stato, resetto.", err);
    state = { items: [] };
    saveState();
  }
}
function saveState(){
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(state));
  } catch (err) {
    console.error("Impossibile salvare lo stato:", err);
  }
}

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

const listEl = document.getElementById("list");
const emptyNote = document.getElementById("emptyNote");

function render(){
  listEl.innerHTML = "";
  if(state.items.length === 0){
    emptyNote.style.display = "";
    return;
  }
  emptyNote.style.display = "none";

  const frag = document.createDocumentFragment();
  state.items.forEach(item => frag.appendChild(buildItem(item)));
  listEl.appendChild(frag);
}

function buildItem(item){
  const wrap = document.createElement("div");
  wrap.className = "item";
  wrap.dataset.id = item.id;
  wrap.draggable = true;
  wrap.setAttribute("role","listitem");

  // INPUTS
  const row1 = document.createElement("div");
  row1.className = "row";

  const cat = document.createElement("input");
  cat.type = "text";
  cat.placeholder = "Categoria";
  cat.value = item.category || "";
  cat.className = "cat-input";
  cat.setAttribute("aria-label","Categoria");

  const url = document.createElement("input");
  url.type = "text";
  url.placeholder = "https://...";
  url.value = item.url || "";
  url.className = "url-input";
  url.setAttribute("aria-label","URL");

  const title = document.createElement("input");
  title.type = "text";
  title.placeholder = "Titolo";
  title.value = item.title || "";
  title.className = "title-input";
  title.setAttribute("aria-label","Titolo");

  row1.appendChild(cat);
  row1.appendChild(url);
  row1.appendChild(title);

  // GO BUTTON
  const goBtn = document.createElement("button");
  goBtn.className = "go-btn";
  goBtn.textContent = "VAI";
  goBtn.title = "Apri link in nuova scheda";
  goBtn.addEventListener("click", () => {
    const u = url.value.trim();
    if(!u) return;
    try {
      const parsed = new URL(u.includes("://") ? u : "https://"+u);
      window.open(parsed.href, "_blank", "noopener,noreferrer");
    } catch {
      alert("URL non valido");
    }
  });

  row1.appendChild(goBtn);
  wrap.appendChild(row1);

  // META: delete flag + delete button
  const meta = document.createElement("div");
  meta.className = "meta";

  const flag = document.createElement("label");
  flag.className = "flag";

  const chk = document.createElement("input");
  chk.type = "checkbox";
  chk.checked = !!item.toDelete;
  chk.setAttribute("aria-label","Segna per eliminazione");

  const txt = document.createElement("span");
  txt.textContent = "da eliminare";

  flag.appendChild(chk);
  flag.appendChild(txt);
  meta.appendChild(flag);

  const delBtn = document.createElement("button");
  delBtn.className = "delete-btn";
  delBtn.textContent = "ELIMINA";
  if(!item.toDelete) delBtn.classList.add("disabled");

  delBtn.addEventListener("click", () => {
    if(!chk.checked){
      delBtn.animate([{transform:"scale(1)"},{transform:"scale(1.1)"},{transform:"scale(1)"}],{duration:200});
      return;
    }
    state.items = state.items.filter(i => i.id !== item.id);
    saveState();
    render();
  });

  chk.addEventListener("change", () => {
    item.toDelete = chk.checked;
    if(chk.checked) delBtn.classList.remove("disabled");
    else delBtn.classList.add("disabled");
    saveState();
  });

  meta.appendChild(delBtn);

  const handle = document.createElement("div");
  handle.className = "handle";
  handle.textContent = "≡";
  handle.setAttribute("tabindex","0");
  handle.setAttribute("aria-grabbed","false");
  meta.appendChild(handle);

  wrap.appendChild(meta);

  // SAVE ON INPUT
  [cat, url, title].forEach(input => {
    input.addEventListener("input", () => {
      item.category = cat.value;
      item.url = url.value;
      item.title = title.value;
      saveState();
    });

    // basic URL validation on blur for the url field
    if(input === url){
      input.addEventListener("blur", () => {
        const v = input.value.trim();
        if(!v) return;
        try { new URL(v.includes("://") ? v : "https://"+v); input.setCustomValidity(""); }
        catch { input.setCustomValidity("URL non valido"); input.reportValidity(); }
      });
    }
  });

  // allow dragging only when starting from the handle (reduces accidental drags)
  handle.addEventListener("mousedown", () => {
    wrap.draggable = true;
  });
  handle.addEventListener("keydown", (e) => {
    // keyboard move: Ctrl + ArrowUp / ArrowDown to reorder
    if(e.ctrlKey && (e.key === "ArrowUp" || e.key === "ArrowDown")){
      e.preventDefault();
      const idx = state.items.findIndex(i => i.id === item.id);
      if(idx === -1) return;
      const swapWith = e.key === "ArrowUp" ? idx - 1 : idx + 1;
      if(swapWith < 0 || swapWith >= state.items.length) return;
      const tmp = state.items[swapWith];
      state.items[swapWith] = state.items[idx];
      state.items[idx] = tmp;
      saveState();
      render();
      // restore focus on the same item
      const el = document.querySelector(`.item[data-id="${item.id}"] .handle`);
      if(el) el.focus();
    }
  });

  return wrap;
}

// CREATE NEW
document.getElementById("createBtn").addEventListener("click", () => {
  const newItem = { id: uid(), category:"", url:"", title:"", toDelete:false };
  state.items.unshift(newItem);
  saveState();
  render();
});

// DRAG & DROP
let draggedEl = null;

listEl.addEventListener("dragstart", e => {
  const item = e.target.closest(".item");
  if(!item) return;
  draggedEl = item;
  item.classList.add("dragging");
  if(e.dataTransfer){
    e.dataTransfer.effectAllowed = "move";
    try { e.dataTransfer.setData("text/plain", item.dataset.id); } catch {}
  }
});

listEl.addEventListener("dragend", e => {
  const item = e.target.closest(".item");
  if(item) item.classList.remove("dragging");
  draggedEl = null;
  saveState();
});

listEl.addEventListener("dragover", e => {
  e.preventDefault();
  const item = e.target.closest(".item");
  if(!item || item === draggedEl) return;

  item.classList.add("drag-over");

  const rect = item.getBoundingClientRect();
  const offset = e.clientY - rect.top;

  if(offset < rect.height/2){
    listEl.insertBefore(draggedEl, item);
  } else {
    listEl.insertBefore(draggedEl, item.nextSibling);
  }
});

listEl.addEventListener("dragleave", e => {
  const item = e.target.closest(".item");
  if(item) item.classList.remove("drag-over");
});

listEl.addEventListener("drop", () => {
  document.querySelectorAll(".drag-over").forEach(el => el.classList.remove("drag-over"));

  const newOrder = [...document.querySelectorAll(".item")].map(el => el.dataset.id);
  state.items.sort((a,b) => newOrder.indexOf(a.id) - newOrder.indexOf(b.id));
  saveState();
});

loadState();
render();
</script>
</body>
