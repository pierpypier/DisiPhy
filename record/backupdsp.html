<div class="box">
    <h2>🔒 Backup Globale</h2>
    <p class="info">Fai un backup totale dei dati</p>
    
    <button class="btn-export" id="exportAll">💾 1. GENERA BACKUP TOTALE</button>
    
    <textarea id="boxTesto" placeholder="Il testo del backup apparirà qui dopo aver cliccato Genera... Oppure incolla qui un vecchio backup per ripristinarlo."></textarea>
    
    <button class="btn-import" id="importAll">📂 2. RIPRISTINA IL TESTO SOPRA</button>
</div>

<script>
const areaTesto = document.getElementById('boxTesto');

// --- ESPORTAZIONE GLOBALE SICURA ---
document.getElementById('exportAll').addEventListener('click', () => {
  const tuttoIlDatabase = {};
  
  for (let i = 0; i < localStorage.length; i++) {
    const chiave = localStorage.key(i);
    tuttoIlDatabase[chiave] = localStorage.getItem(chiave);
  }
  
  // Scrive il codice direttamente nella scatola di testo gigante
  areaTesto.value = JSON.stringify(tuttoIlDatabase);
  areaTesto.select();
  areaTesto.setSelectionRange(0, 99999); // Forza la selezione totale su smartphone
  
  alert("✅ Backup calcolato con successo nella casella qui sotto!\n\nTocca il testo nella casella, selezionalo TUTTO, copialo e salvalo sul tuo Foglio Google.");
});

// --- IMPORTAZIONE GLOBALE SICURA ---
document.getElementById('importAll').addEventListener('click', () => {
  const testoDaCaricare = areaTesto.value.trim();
  
  if (!testoDaCaricare) {
    alert("❌ Errore: La casella di testo è vuota! Prima incolla il backup dentro la casella.");
    return;
  }

  try {
    const databaseRipristinato = JSON.parse(testoDaCaricare);
    
    // Un minimo di controllo per verificare che sia un oggetto valido
    if (typeof databaseRipristinato !== 'object' || databaseRipristinato === null) {
      throw new Error();
    }
    
    if (confirm("⚠️ ATTENZIONE: Questo rimpiazzerà i dati di tutte le tue decine di pagine sul telefono con quelli scritti nella casella. Confermi?")) {
      localStorage.clear();
      
      for (const chiave in databaseRipristinato) {
        localStorage.setItem(chiave, databaseRipristinato[chiave]);
      }
      
      alert("✅ Ripristino Totale Completato con Successo! Riapri le tue pagine per vedere i dati.");
      areaTesto.value = ""; // Pulisce la casella
    }
  } catch (err) {
    alert("❌ Errore: Il testo nella casella NON è un backup valido. Assicurati di averlo copiato integralmente dal tuo Foglio Google (senza perdere le parentesi graffe iniziali o finali {}).");
  }
});
</script>
