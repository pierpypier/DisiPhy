<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cassaforte Backup Globale PRO</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background: #f4f4f9; color: #333; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: 20px auto; }
        button, .label-file { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; display: block; box-sizing: border-box; }
        .btn-export { background: #2ecc71; color: white; }
        .btn-import { background: #3498db; color: white; }
        .label-file { background: #e67e22; color: white; text-align: center; line-height: 1.2; }
        #fileInput { display: none; } /* Nasconde l'input brutto del browser */
        textarea { width: 100%; height: 120px; margin-top: 15px; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-family: monospace; font-size: 12px; box-sizing: border-box; resize: vertical; }
        .info { font-size: 13px; color: #666; margin-bottom: 15px; }
   
        /* stile barra di navigazione */
        .nav { display: flex; justify-content: center; gap: 10px; padding: 5px 0; }
        .nav-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #000; font-size: 14px; transition: opacity 0.2s ease; }
        .nav-item img { width: 84px; height: 84px; margin-bottom: 1px; transition: transform 0.2s ease; }
        .nav-item:hover img { transform: scale(1.05); }
        .nav-item:hover { opacity: 0.85; }

        @media (max-width: 600px) {
          .nav { gap: 10px; }
          .nav-item img { width: 60px; height: 60px; }
          .nav-item span { font-size: 12px; }
        }
    </style>
</head>
<body>

<nav class="nav">
  <a href="organizer4.html" class="nav-item">
    <img src="rimage/orga4.png" alt="Organizer">
    <span> NOTE </span>
  </a>
  <a href="caldsp.html" class="nav-item">
    <img src="rimage/calicon.png" alt="Calendario dsp">
    <span> DATE </span>
  </a>
  <a href="check01.html" class="nav-item">
    <img src="rimage/check02.png" alt="Checklist">
    <span>LISTE</span>
  </a>
  <a href="strweb.html" class="nav-item">
    <img src="rimage/webicon.png" alt="Strumenti web" loading="lazy" decoding="async" width="84" height="84">
    <span> WEB </span>
  </a>
  <a href="dashconsolle.html" class="nav-item">
    <img src="rimage/opzioni.png" alt="Opzioni">
    <span> ADD </span>
  </a>
</nav>
<div class="box">
    <h2>🔒 Backup Globale</h2>
    <p class="info">Fai un backup totale dei dati senza limiti di spazio</p>
    
    <button class="btn-export" id="exportAll">💾 1. SCARICA FILE BACKUP (.TXT)</button>
    
    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
    
    <label for="fileInput" class="label-file">📂 2A. SELEZIONA FILE BACKUP (.TXT)</label>
    <input type="file" id="fileInput" accept=".txt">

    <p style="font-size: 12px; margin: 5px 0; font-weight: bold; color: #999;">— OPPURE —</p>

    <textarea id="boxTesto" placeholder="Incolla qui il testo del backup se lo hai salvato come stringa..."></textarea>
    <button class="btn-import" id="importAll">📂 2B. RIPRISTINA DA TESTO SOPRA</button>
</div>

<script>
const areaTesto = document.getElementById('boxTesto');
const fileInput = document.getElementById('fileInput');

// --- 1. FUNZIONE ESPORTAZIONE CON FILE .TXT (BYPASS CLIPBOARD) ---
document.getElementById('exportAll').addEventListener('click', () => {
  const tuttoIlDatabase = {};
  
  for (let i = 0; i < localStorage.length; i++) {
    const chiave = localStorage.key(i);
    tuttoIlDatabase[chiave] = localStorage.getItem(chiave);
  }
  
  const stringaTotale = JSON.stringify(tuttoIlDatabase);
  
  // Mostra comunque l'inizio nella textarea per feedback visivo
  areaTesto.value = stringaTotale;
  
  // Creiamo il file al volo in memoria
  const blob = new Blob([stringaTotale], { type: 'text/plain;charset=utf-8' });
  const downloadLink = document.createElement('a');
  
  // Generiamo un nome file pulito con la data di oggi
  const dataOggi = new Date().toISOString().slice(0, 10);
  downloadLink.download = `backup_agenda_completo_${dataOggi}.txt`;
  downloadLink.href = window.URL.createObjectURL(blob);
  downloadLink.style.display = 'none';
  
  document.body.appendChild(downloadLink);
  downloadLink.click(); // Forza il browser a scaricare il file
  document.body.removeChild(downloadLink);
  
  alert("✅ FILE SCARICATO!\n\nIl backup totale è stato salvato nei 'Download' del tuo telefono come file .txt.\n\nOra puoi prendere questo file e caricarlo su Google Drive per tenerlo al sicuro!");
});

// --- 2. FUNZIONE RIPRISTINO DA FILE .TXT ---
fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(evt) {
    const contenutoFile = evt.target.result.trim();
    eseguiRipristinoDatabase(contenutoFile);
  };
  reader.readAsText(file);
});

// --- 3. FUNZIONE RIPRISTINO DA TEXTAREA MANUALE ---
document.getElementById('importAll').addEventListener('click', () => {
  const testoDaCaricare = areaTesto.value.trim();
  if (!testoDaCaricare) {
    alert("❌ Errore: La casella di testo è vuota!");
    return;
  }
  eseguiRipristinoDatabase(testoDaCaricare);
});

// --- MOTORE DI RIPRISTINO UNIFICATO E SICURO ---
function eseguiRipristinoDatabase(stringaJson) {
  try {
    const databaseRipristinato = JSON.parse(stringaJson);
    
    if (typeof databaseRipristinato !== 'object' || databaseRipristinato === null) {
      throw new Error();
    }
    
    if (confirm("⚠️ ATTENZIONE: Questo rimpiazzerà TUTTI i dati presenti ora sul telefono con quelli del backup. Confermi il ripristino?")) {
      localStorage.clear();
      
      for (const chiave in databaseRipristinato) {
        localStorage.setItem(chiave, databaseRipristinato[chiave]);
      }
      
      alert("✅ Ripristino Totale Completato con Successo!\n\nI dati sono stati caricati nel telefono. Riapri le tue pagine per usarli.");
      areaTesto.value = ""; 
      fileInput.value = ""; // Resetta l'input file
    }
  } catch (err) {
    alert("❌ Errore: I dati non sono validi. Assicurati che il file .txt o il testo incollato non siano corrotti o tagliati.");
  }
}
</script>

</body>
</html>
