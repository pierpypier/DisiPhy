<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda attività</title>

<style>
/* =========================
   STILE GENERALE
========================= */
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f4f4f4;
}

h1{
    text-align:center;
    margin:10px 0;
}

/* =========================
   TIMER
========================= */
#timerBox{
    background:#fff;
    padding:10px;
    margin:10px;
    border-radius:10px;
}

#countdown{
    font-size:22px;
    margin-top:5px;
}

button{
    cursor:pointer;
}

/* pulsanti arrotondati */
.btn{
    border:none;
    padding:8px 16px;
    border-radius:50px;
    margin:5px;
    color:#fff;
}

.btn-start{ background:green; }
.btn-reset{ background:red; }

/* =========================
   CATEGORIE
========================= */
#catBox{
    background:#fff;
    margin:10px;
    padding:10px;
    border-radius:10px;
}

.cat-btn{
    background:#1e66ff;
    color:#fff;
    border:none;
    padding:6px 10px;
    margin:3px;
    border-radius:6px;
}

/* =========================
   RECORD
========================= */
.record{
    background:#fff;
    margin:10px;
    padding:10px;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.record.done{
    background:#d4f8d4;
}

.record.texted{
    background:#ffd6d6;
}

textarea{
    width:100%;
    min-height:60px;
    resize:vertical;
}

/* ========================= */
img{
    max-width:120px;
    display:block;
    margin-top:5px;
}
</style>
</head>

<body>

<h1>Agenda attività</h1>

<!-- ================= TIMER ================= -->
<div id="timerBox">
    <input type="number" id="secInput" placeholder="secondi">
    <button class="btn btn-start" id="startBtn">Start</button>
    <button class="btn btn-reset" id="resetBtn">Reset</button>
    <div id="countdown">0</div>
</div>

<!-- ================= CATEGORIE ================= -->
<div id="catBox">
    <input type="text" id="newCat" placeholder="nuova categoria">
    <button id="addCat">Aggiungi</button>
    <div id="catList"></div>
</div>

<!-- ================= RECORD ================= -->
<div id="recordBox"></div>

<audio id="alarm" src="rsound/rdri.mp3"></audio>

<script>
/* =========================================================
   STORAGE KEYS
========================================================= */
const LS_CAT = "categorie_v1";
const LS_REC = "record_v1";

/* =========================================================
   INIT DATA
========================================================= */
let categories = JSON.parse(localStorage.getItem(LS_CAT)) || ["Tutti"];
let records = JSON.parse(localStorage.getItem(LS_REC)) || [];

let activeFilter = "Tutti";

/* =========================================================
   SALVATAGGIO
========================================================= */
function save(){
    localStorage.setItem(LS_CAT, JSON.stringify(categories));
    localStorage.setItem(LS_REC, JSON.stringify(records));
}

/* =========================================================
   CATEGORIE UI
========================================================= */
function renderCategories(){
    const box = document.querySelector("#catList");
    box.innerHTML = "";

    categories.forEach(cat=>{
        const btn = document.createElement("button");
        btn.className = "cat-btn";
        btn.textContent = cat;

        btn.onclick = ()=>{
            activeFilter = cat;
            renderRecords();
        };

        box.appendChild(btn);
    });
}

/* aggiunta categoria */
document.querySelector("#addCat").addEventListener("click", ()=>{
    const val = document.querySelector("#newCat").value.trim();
    if(val && !categories.includes(val)){
        categories.push(val);
        save();
        renderCategories();
    }
});

/* =========================================================
   RECORD
========================================================= */
function weekday(dateStr){
    const days = ["Domenica","Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato"];
    const d = new Date(dateStr);
    return isNaN(d) ? "" : days[d.getDay()];
}

function renderRecords(){
    const box = document.querySelector("#recordBox");
    box.innerHTML = "";

    records
    .filter(r => activeFilter === "Tutti" || r.cat === activeFilter)
    .forEach((r, i)=>{

        const div = document.createElement("div");
        div.className = "record";

        if(r.done) div.classList.add("done");
        if(r.text && r.text.length>0) div.classList.add("texted");

        /* categoria */
        const sel = document.createElement("select");
        categories.forEach(c=>{
            const o = document.createElement("option");
            o.value = c;
            o.textContent = c;
            if(c === r.cat) o.selected = true;
            sel.appendChild(o);
        });

        sel.onchange = e=>{
            r.cat = e.target.value;
            save(); renderRecords();
        };

        /* immagine */
        const img = document.createElement("img");
        img.src = "rimage/r" + String(r.img).padStart(3,"0") + ".jpg";

        const imgSel = document.createElement("input");
        imgSel.type = "number";
        imgSel.min = 1;
        imgSel.max = 999;
        imgSel.value = r.img;

        imgSel.oninput = e=>{
            r.img = e.target.value;
            img.src = "rimage/r" + String(r.img).padStart(3,"0") + ".jpg";
            save();
        };

        /* descrizione */
        const txt = document.createElement("textarea");
        txt.placeholder = "descrizione attività";
        txt.value = r.text || "";

        txt.oninput = e=>{
            r.text = e.target.value;
            save(); renderRecords();
        };

        /* checkbox done */
        const chk = document.createElement("input");
        chk.type = "checkbox";
        chk.checked = r.done;

        chk.onchange = e=>{
            r.done = e.target.checked;
            save(); renderRecords();
        };

        /* data */
        const date = document.createElement("input");
        date.type = "date";
        date.value = r.date || "";

        const weekdayDiv = document.createElement("div");
        weekdayDiv.textContent = weekday(r.date);

        date.onchange = e=>{
            r.date = e.target.value;
            weekdayDiv.textContent = weekday(r.date);
            save();
        };

        /* ora */
        const time = document.createElement("input");
        time.type = "time";
        time.value = r.time || "";

        time.onchange = e=>{
            r.time = e.target.value;
            save();
        };

        div.append(sel, imgSel, img, txt, chk, date, weekdayDiv, time);
        box.appendChild(div);
    });
}

/* aggiungi record demo */
if(records.length === 0){
    records.push({
        cat:"Tutti",
        img:1,
        text:"",
        done:false,
        date:"",
        time:""
    });
}

/* =========================================================
   TIMER
========================================================= */
let timer = null;
let remaining = 0;

function startTimer(){
    const input = document.querySelector("#secInput");
    remaining = parseInt(input.value);

    const display = document.querySelector("#countdown");
    const alarm = document.querySelector("#alarm");

    clearInterval(timer);

    timer = setInterval(()=>{
        display.textContent = remaining;

        if(remaining <= 0){
            clearInterval(timer);
            alarm.play();
        }
        remaining--;
    },1000);
}

function resetTimer(){
    clearInterval(timer);
    document.querySelector("#countdown").textContent = "0";
}

/* DOM queries dirette nei listener */
document.querySelector("#startBtn").addEventListener("click", startTimer);
document.querySelector("#resetBtn").addEventListener("click", resetTimer);

/* =========================================================
   INIT
========================================================= */
renderCategories();
renderRecords();

</script>

</body>
</html>
