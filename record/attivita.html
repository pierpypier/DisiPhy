<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Attività</title>

<style>
body{
  font-family:Arial;
  margin:0;
  padding:10px;
  background:#f5f5f5;
}

h1{text-align:center;}

/* TIMER */
.timer{
  display:flex;
  gap:10px;
  align-items:center;
  justify-content:center;
  margin-bottom:20px;
}

.timer input{
  width:80px;
}

.timer span{
  font-size:26px;
  min-width:60px;
  text-align:center;
}

/* FILTRI */
.filters{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:15px;
}

.filters button{
  padding:8px 12px;
}

/* RECORD */
.record{
  background:white;
  border-radius:8px;
  padding:10px;
  margin-bottom:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.record textarea{
  width:100%;
  font-size:18px;
  margin-top:5px;
}

.record img{
  width:100%;
  margin-top:8px;
  border-radius:6px;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}

.small{
  font-size:14px;
}

/* COLORI STATO */
.empty{background:#fff;}
.partial{background:#ffe5e5;}
.done{background:#e5ffe5;}

button{
  cursor:pointer;
}
</style>
</head>

<body>

<h1>Dashboard Attività</h1>

<!-- TIMER -->
<div class="timer">
<input type="number" id="secInput" placeholder="sec">
<button onclick="startTimer()">Start</button>
<button onclick="resetTimer()">Reset</button>
<span id="display"><b>0</b></span>
</div>

<audio id="beep" src="rsound/rdri.mp3"></audio>

<!-- FILTRI -->
<div class="filters">
<button onclick="setFilter('all')">Tutte</button>
<button onclick="setFilter('1')">Cat 1</button>
<button onclick="setFilter('2')">Cat 2</button>
<button onclick="setFilter('3')">Cat 3</button>
</div>

<!-- ADD -->
<div style="text-align:center;margin-bottom:10px;">
<button onclick="addRecord()">+ Nuovo Record</button>
</div>

<!-- LISTA -->
<div id="list"></div>

<script>

let storageKey="dashboard_attivita";
let timer=null;
let remaining=0;
let filter="all";

/* ---------------- TIMER ---------------- */
function startTimer(){
  if(timer) return;

  remaining=parseInt(secInput.value||0);

  timer=setInterval(()=>{
    if(remaining<=0){
      clearInterval(timer);
      timer=null;
      beep.play();
      return;
    }

    display.innerHTML="<b>"+remaining+"</b>";
    remaining--;
  },1000);
}

function resetTimer(){
  clearInterval(timer);
  timer=null;
  remaining=0;
  display.innerHTML="<b>0</b>";
}

/* ---------------- FILTER ---------------- */
function setFilter(f){
  filter=f;
  render();
}

/* ---------------- DATA ---------------- */
function getData(){
  return JSON.parse(localStorage.getItem(storageKey)||"[]");
}

function saveData(data){
  localStorage.setItem(storageKey,JSON.stringify(data));
}

/* ---------------- ADD ---------------- */
function addRecord(){
  let data=getData();

  data.push({
    id:Date.now(),
    cat:"1",
    img:"r001.jpg",
    text:"",
    done:false,
    date:"",
    time:""
  });

  saveData(data);
  render();
}

/* ---------------- DELETE ---------------- */
function deleteRecord(id){
  let data=getData().filter(r=>r.id!==id);
  saveData(data);
  render();
}

/* ---------------- UPDATE ---------------- */
function update(id,field,value){
  let data=getData();

  let r=data.find(x=>x.id===id);
  r[field]=value;

  saveData(data);
  render();
}

/* ---------------- COLOR ---------------- */
function getClass(r){
  if(r.done) return "done";
  if(r.text.trim()!=="") return "partial";
  return "empty";
}

/* ---------------- RENDER ---------------- */
function render(){
  let list=document.getElementById("list");
  list.innerHTML="";

  let data=getData();

  data
  .filter(r=>filter==="all" || r.cat===filter)
  .forEach(r=>{

    let div=document.createElement("div");
    div.className="record "+getClass(r);

    div.innerHTML=`
      <div class="row">

        <select onchange="update(${r.id},'cat',this.value)">
          <option value="1" ${r.cat=="1"?"selected":""}>Cat 1</option>
          <option value="2" ${r.cat=="2"?"selected":""}>Cat 2</option>
          <option value="3" ${r.cat=="3"?"selected":""}>Cat 3</option>
        </select>

        <select onchange="updateImg(${r.id},this.value)">
          ${Array.from({length:20},(_,i)=>
            `<option value="r${String(i+1).padStart(3,'0')}.jpg">
              r${String(i+1).padStart(3,'0')}
            </option>`
          ).join("")}
        </select>

        <button onclick="deleteRecord(${r.id})">🗑</button>

      </div>

      <img loading="lazy" src="rimage/${r.img}">

      <input type="checkbox" ${r.done?"checked":""}
      onchange="update(${r.id},'done',this.checked)">

      <textarea
        placeholder="descrizione attività"
        oninput="update(${r.id},'text',this.value)"
      >${r.text}</textarea>

      <div class="small">
        data <input type="date" value="${r.date}"
        onchange="update(${r.id},'date',this.value)">

        ora <input type="time" value="${r.time}"
        onchange="update(${r.id},'time',this.value)">
      </div>
    `;

    list.appendChild(div);
  });
}

/* ---------------- IMAGE ---------------- */
function updateImg(id,val){
  let data=getData();
  let r=data.find(x=>x.id===id);
  r.img=val;
  saveData(data);
  render();
}

/* INIT */
render();

</script>

</body>
  </html>
