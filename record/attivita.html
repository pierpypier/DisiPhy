<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Dashboard Operativa</title>

<style>
body{
  font-family: Arial;
  margin:0;
  padding:20px;
}

/* ---------------- CATEGORIE ---------------- */

#catBar{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

.cat-btn{
  background:#1e66ff;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
}

.cat-btn.active{
  background:#0d3fb8;
}

.cat-add{
  background:#444;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
}

/* ---------------- DASHBOARD RECORD ---------------- */

.record{
  border:1px solid #ddd;
  padding:10px;
  margin-bottom:10px;
}

/* textarea stabile */
textarea{
  width:100%;
  min-height:60px;
}

/* ---------------- TIMER ---------------- */

.timer{
  display:flex;
  gap:10px;
  align-items:center;
  margin-top:20px;
}

.timer input{
  width:80px;
  padding:6px;
}

.btn-start,
.btn-reset{
  border:none;
  padding:10px 16px;
  border-radius:999px;
  cursor:pointer;
  color:white;
}

.btn-start{
  background:green;
}

.btn-reset{
  background:#777;
}

#display{
  font-size:24px;
  font-weight:bold;
}

/* ---------------- IMMAGINI ---------------- */

#imageGrid{
  display:grid;
  grid-template-columns:repeat(10, 1fr);
  gap:4px;
  margin-top:20px;
  max-height:300px;
  overflow:auto;
}

.img-item{
  width:100%;
  aspect-ratio:1/1;
  background:#eee;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:10px;
}

.img-item.selected{
  outline:3px solid blue;
}
</style>
</head>

<body>

<!-- ================= CATEGORIE ================= -->
<div id="catBar"></div>

<!-- ================= RECORD ================= -->
<div id="dashboard"></div>

<!-- ================= TIMER ================= -->
<div class="timer">
  <input type="number" id="secInput" placeholder="sec">
  <button class="btn-start" onclick="startTimer()">Start</button>
  <button class="btn-reset" onclick="resetTimer()">Reset</button>
  <span id="display">0</span>
</div>

<!-- ================= IMMAGINI ================= -->
<div id="imageGrid"></div>

<script>

/* ================= STATE ================= */

let catKey="dashboard_categories";
let selectedCategory="Tutte";

let timer=null;
let remaining=0;

/* ================= CATEGORIE ================= */

function getCategories(){
  return JSON.parse(localStorage.getItem(catKey)) || [];
}

function saveCategories(c){
  localStorage.setItem(catKey, JSON.stringify(c));
}

function renderCategories(){

  let bar=document.getElementById("catBar");
  bar.innerHTML="";

  // categoria fissa
  bar.innerHTML+=`
    <button class="cat-btn ${selectedCategory==='Tutte'?'active':''}"
      onclick="setCategory('Tutte')">Tutte</button>
  `;

  let cats=getCategories();

  cats.forEach(c=>{
    bar.innerHTML+=`
      <button class="cat-btn ${selectedCategory===c?'active':''}"
        onclick="setCategory('${c}')">${c}</button>
      <button class="cat-add" onclick="removeCategory('${c}')">x</button>
    `;
  });

  bar.innerHTML+=`
    <button class="cat-add" onclick="addCategory()">+</button>
  `;
}

function setCategory(c){
  selectedCategory=c;
  renderCategories();
}

function addCategory(){
  let name=prompt("Nome categoria:");
  if(!name) return;

  let cats=getCategories();
  if(!cats.includes(name)){
    cats.push(name);
    saveCategories(cats);
  }
  renderCategories();
}

function removeCategory(c){
  let cats=getCategories().filter(x=>x!==c);
  saveCategories(cats);

  if(selectedCategory===c){
    selectedCategory="Tutte";
  }

  renderCategories();
}

/* ================= DASHBOARD (placeholder base) ================= */

function renderDashboard(){
  let d=document.getElementById("dashboard");
  d.innerHTML="";

  d.innerHTML=`
    <div class="record">
      <textarea placeholder="scrivi..."></textarea>
    </div>
  `;
}

/* ================= TIMER ================= */

function startTimer(){

  if(timer) return;

  remaining=parseInt(secInput.value||0);

  timer=setInterval(()=>{

    if(remaining<=0){
      clearInterval(timer);
      timer=null;
      display.innerHTML="0";
      return;
    }

    display.innerHTML=remaining;
    remaining--;

  },1000);
}

function resetTimer(){
  clearInterval(timer);
  timer=null;
  display.innerHTML="0";
}

/* ================= IMMAGINI 999 ================= */

let selectedImages=new Set();

function renderImages(){

  let grid=document.getElementById("imageGrid");
  grid.innerHTML="";

  for(let i=1;i<=999;i++){

    grid.innerHTML+=`
      <div class="img-item ${selectedImages.has(i)?'selected':''}"
        onclick="toggleImg(${i})">
        ${i}
      </div>
    `;
  }
}

function toggleImg(i){
  if(selectedImages.has(i)){
    selectedImages.delete(i);
  }else{
    selectedImages.add(i);
  }
  renderImages();
}

/* ================= INIT ================= */

renderCategories();
renderDashboard();
renderImages();

</script>

</body>
  </html>
