<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda attività</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f3f3f3;
}

h1{text-align:center;}

.box{
    background:#fff;
    margin:10px;
    padding:10px;
    border-radius:10px;
}

.record{
    background:#fff;
    margin:10px;
    padding:10px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
    transition:0.2s;
}

/* COMPLETATO */
.record.done{
    background:#c8f7c5;
}

.done-label{
    font-weight:bold;
    color:green;
    margin-top:5px;
}

/* IMMAGINE 90% */
.record img{
    width:90%;
    display:block;
    margin:8px auto;
}

/* CATEGORIE */
.cat-btn{
    background:#1e66ff;
    color:#fff;
    border:none;
    margin:3px;
    padding:6px 10px;
    border-radius:6px;
}

/* TIMER */
.btn{
    border:none;
    padding:8px 16px;
    border-radius:999px;
    color:#fff;
    cursor:pointer;
}
.start{background:green;}
.reset{background:red;}

textarea{
    width:100%;
    min-height:60px;
    resize:vertical;
}
</style>
</head>

<body>

<h1>Agenda attività</h1>

<div class="box" id="timer">
<input id="sec" type="number">
<button class="btn start" id="start">Start</button>
<button class="btn reset" id="reset">Reset</button>
<div id="out">0</div>
</div>

<div class="box" id="cats"></div>

<div class="box">
<button id="add">+ record</button>
<div id="list"></div>
</div>

<audio id="sound" src="rsound/rdri.mp3"></audio>

<script>

let recs=[];

/* =========================
   CREATE RECORD
========================= */
function createRecord(){
    const r={
        id:Date.now(),
        cat:"Tutti",
        img:0,
        text:"",
        done:false,
        date:"1900-01-01",
        time:"08:00"
    };

    recs.push(r);
    render();
}

/* =========================
   RENDER
========================= */
function render(){
    const box=document.querySelector("#list");
    box.innerHTML="";

    recs.forEach(r=>{

        const div=document.createElement("div");
        div.className="record";

        if(r.done) div.classList.add("done");

        /* IMMAGINE DROPDOWN 0-999 */
        const sel=document.createElement("select");

        for(let i=0;i<=999;i++){
            const o=document.createElement("option");
            o.value=i;
            o.textContent=i;
            if(i==r.img) o.selected=true;
            sel.appendChild(o);
        }

        const img=document.createElement("img");

        function setImg(){
            img.src="rimage/r"+String(r.img).padStart(3,"0")+".jpg";
        }

        sel.onchange=e=>{
            r.img=e.target.value;
            setImg();
        };

        setImg();

        /* DESCRIZIONE (FIX: NO RE-RENDER) */
        const txt=document.createElement("textarea");
        txt.placeholder="descrizione attività";
        txt.value=r.text;

        txt.oninput=e=>{
            r.text=e.target.value;
            div.style.background = r.text.trim() ? "#ffe1e1" : "#fff";
        };

        /* CHECK COMPLETATO */
        const chk=document.createElement("input");
        chk.type="checkbox";
        chk.checked=r.done;

        const label=document.createElement("div");

        function updateDone(){
            r.done=chk.checked;

            if(r.done){
                div.classList.add("done");
                label.textContent="COMPLETATO";
            }else{
                div.classList.remove("done");
                label.textContent="";
            }
        }

        chk.onchange=updateDone;
        updateDone();

        div.append(sel,img,txt,chk,label);
        box.appendChild(div);
    });
}

/* =========================
   TIMER
========================= */
let t;
let r=0;

document.querySelector("#start").onclick=()=>{
    r=parseInt(document.querySelector("#sec").value||0);

    clearInterval(t);

    t=setInterval(()=>{
        document.querySelector("#out").textContent=r;

        if(r<=0){
            clearInterval(t);
            document.querySelector("#sound").play();
            return;
        }
        r--;
    },1000);
};

document.querySelector("#reset").onclick=()=>{
    clearInterval(t);
    document.querySelector("#out").textContent=0;
};

/* INIT */
document.querySelector("#add").onclick=createRecord;

createRecord();

</script>

</body>
</html>
