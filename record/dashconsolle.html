<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Opzioni organizer</title>
  <style>
    :root{
      --bg:#f6f8fb;
      --card:#ffffff;
      --accent:#1e88e5;
      --muted:#6b7280;
      --shadow:0 8px 24px rgba(20,30,50,0.06);
      --radius:12px;
      --max-width:980px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,Arial,Helvetica,sans-serif;
      background:linear-gradient(180deg,#eef4ff 0%,var(--bg) 100%);
      padding:28px;
      display:flex;
      justify-content:center;
      color:#0f172a;
    }
    .container{
      width:100%;
      max-width:var(--max-width);
    }

    .card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:18px;
    }

    .header{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }
    .title{
      font-size:18px;
      font-weight:800;
      color:var(--accent);
    }
    .subtitle{
      font-size:14px;
      color:var(--muted);
      font-weight:600;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit,minmax(240px,1fr));
      gap:14px;
      align-items:start;
    }

    .item{
      background:#fbfdff;
      border-radius:10px;
      border:1px solid #eef2f7;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      align-items:stretch;
      text-decoration:none;
      color:inherit;
      transition:transform .14s ease, box-shadow .14s ease;
    }
    .item:hover{ transform:translateY(-6px); box-shadow:0 18px 40px rgba(20,30,50,0.08); }

    .thumb{
      width:100%;
      height:800px;
      background:#f3f6fb;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }
    .thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .meta{
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .meta .name{
      font-weight:800;
      font-size:14px;
      color:#0f172a;
    }
    .meta .desc{
      font-size:13px;
      color:var(--muted);
      line-height:1.3;
    }

    .note{
      font-size:13px;
      color:var(--muted);
      margin-top:6px;
      text-align:center;
    }

    footer{
      margin-top:8px;
      font-size:13px;
      color:var(--muted);
      text-align:center;
    }

    @media (max-width:520px){
      .thumb{ height:800px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="card header" aria-hidden="false">
      <div>
        <div class="title">Opzioni organizer</div>
        <div class="subtitle">Scegli il layout</div>
      </div>
      <div class="subtitle">Layout rapido</div>
    </div>

    <div class="card">
      <div class="grid">
        <!-- Versione 1 -->
        <a class="item" href="organizer2.html" title="Apri organizer2.html - layout pulsanti in basso">
          <div class="thumb" aria-hidden="true">
            <img src="rimage/tz020.jpg" alt="Anteprima layout pulsanti in basso" loading=lazy" decoding="async" width="480" height"800">
          </div>
          <div class="meta">
            <div class="name">Versione 1</div>
            <div class="desc">Layout con pulsanti in basso</div>
          </div>
        </a>

        <!-- Versione 2 -->
        <a class="item" href="organizer4.html" title="Apri organizer4.html - layout pulsanti in alto">
          <div class="thumb" aria-hidden="true">
            <img src="rimage/tz040.jpg" alt="Anteprima layout pulsanti in alto" loading=lazy" decoding="async" width="480" height"800">
          </div>
          <div class="meta">
            <div class="name">Versione 2</div>
            <div class="desc">Layout con pulsanti in alto</div>
          </div>
        </a>
      </div>

      <div class="note">Questa agenda è pensata per le tue attività</div>
    </div>

    <footer>
      Immagini in <code>rimage/</code>. Clicca l'anteprima per aprire la pagina corrispondente.
    </footer>

  </div>
</body>
  </html>
